<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="XO Game — Classic Tic-Tac-Toe built with HTML, CSS and JavaScript." />
  <title>XO Game</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Animated Background ── -->
  <div class="bg" aria-hidden="true">
    <div class="grid-lines"></div>
    <div class="orb orb-x"></div>
    <div class="orb orb-o"></div>
  </div>

  <!-- ── Main Card ── -->
  <div class="wrapper">
    <div class="card" role="main">

      <!-- Result Overlay (shown after win or draw) -->
      <div
        class="result-overlay"
        id="resultOverlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="resultTitle"
        aria-live="assertive"
      >
        <div class="result-icon" id="resultIcon" aria-hidden="true"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub"   id="resultSub"></div>
        <button
          class="btn-play-again"
          id="btnPlayAgain"
          onclick="newRound()"
          aria-label="Play again"
        >
          Play Again <i class="ti ti-refresh"></i>
        </button>
      </div>

      <!-- Header -->
      <div class="header">
        <div class="logo">
          <span class="x">X</span>
          <span style="color:var(--muted); font-weight:300;">·</span>
          <span class="o">O</span>
          <span style="color:var(--text); font-size:1rem; font-weight:400; margin-left:6px;">Game</span>
        </div>
        <div class="subtitle">Two Player · Best of ∞</div>
      </div>

      <!-- Score Board -->
      <div class="scoreboard" aria-label="Scoreboard">

        <!-- Player X score -->
        <div class="score-card" id="scoreCardX" aria-label="Player X score">
          <div class="score-label x">Player X</div>
          <div class="score-value x" id="scoreX">0</div>
        </div>

        <!-- Draws -->
        <div class="score-divider" aria-label="Draws">
          <div style="font-size:0.62rem; color:var(--faint); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px;">Draw</div>
          <div class="draw-count" id="scoreDraw">0</div>
        </div>

        <!-- Player O score -->
        <div class="score-card" id="scoreCardO" aria-label="Player O score">
          <div class="score-label o">Player O</div>
          <div class="score-value o" id="scoreO">0</div>
        </div>

      </div>

      <!-- Turn Indicator -->
      <div class="turn-bar" id="turnBar" aria-live="polite" aria-atomic="true">
        <span class="turn-dot x" id="turnDot"></span>
        <span id="turnLabel">Player X's turn</span>
      </div>

      <!-- Game Board -->
      <div
        class="board"
        id="board"
        role="grid"
        aria-label="Tic-Tac-Toe board"
      ></div>

      <!-- Status (draw / win text fallback) -->
      <div class="status" id="status" aria-live="polite"></div>

      <!-- Action Buttons -->
      <div class="btn-row">
        <button
          class="btn-restart"
          onclick="newRound()"
          aria-label="Start a new round"
        >
          <i class="ti ti-refresh"></i> New Round
        </button>
        <button
          class="btn-reset-scores"
          onclick="resetScores()"
          aria-label="Reset all scores to zero"
        >
          Reset Scores
        </button>
      </div>

    </div><!-- /card -->
  </div><!-- /wrapper -->

  <!-- JavaScript (loaded last for performance) -->
  <script src="script.js"></script>

</body>
</html>
